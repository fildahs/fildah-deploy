services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    environment:
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - auth-web
      - fildah-web
      - healthscout-web
      - rxchat-web

  api:
    image: ${FILDAH_API_IMAGE:-ghcr.io/fildahs/fildah-api:main}
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_SSL_REQUIRE: "False"
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      BILLING_MONTHLY_DISCOUNT: ${BILLING_MONTHLY_DISCOUNT:-0.13}
      BILLING_YEARLY_DISCOUNT: ${BILLING_YEARLY_DISCOUNT:-0.17}
      BILLING_RENEWAL_WINDOW_DAYS: ${BILLING_RENEWAL_WINDOW_DAYS:-3}
      BILLING_DEFAULT_PROVIDER: ${BILLING_DEFAULT_PROVIDER:-paystack}
      BILLING_CARD_PROVIDER: ${BILLING_CARD_PROVIDER:-}
      BILLING_TRANSFER_PROVIDER: ${BILLING_TRANSFER_PROVIDER:-}
      PAYSTACK_BASE_URL: ${PAYSTACK_BASE_URL:-https://api.paystack.co}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY:-}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY:-}
      PAYSTACK_DVA_PREFERRED_BANK: ${PAYSTACK_DVA_PREFERRED_BANK:-}
      PAYSTACK_TIMEOUT_SECONDS: ${PAYSTACK_TIMEOUT_SECONDS:-15}
      OPAY_BASE_URL: ${OPAY_BASE_URL:-}
      OPAY_PUBLIC_KEY: ${OPAY_PUBLIC_KEY:-}
      OPAY_SECRET_KEY: ${OPAY_SECRET_KEY:-}
      OPAY_MERCHANT_ID: ${OPAY_MERCHANT_ID:-}
      OPAY_STATIC_VA_PATH: ${OPAY_STATIC_VA_PATH:-}
      OPAY_CALLBACK_HASH: ${OPAY_CALLBACK_HASH:-sha512}
      OPAY_TIMEOUT_SECONDS: ${OPAY_TIMEOUT_SECONDS:-15}
      HEALTHSCOUT_ORIGINS: ${HEALTHSCOUT_ORIGINS:-}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-5}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-12}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-180}
      GUNICORN_KEEP_ALIVE: ${GUNICORN_KEEP_ALIVE:-15}
    volumes:
      - django_media:/app/media
    depends_on:
      - postgres
      - qdrant
      - redis
    expose:
      - "8000"

  worker:
    image: ${FILDAH_WORKER_IMAGE:-ghcr.io/fildahs/fildah-api-worker:main}
    command: celery -A config worker --loglevel=info --concurrency=1
    restart: unless-stopped
    mem_limit: 2.5g
    cpus: "1"
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_SSL_REQUIRE: "False"
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      BILLING_MONTHLY_DISCOUNT: ${BILLING_MONTHLY_DISCOUNT:-0.13}
      BILLING_YEARLY_DISCOUNT: ${BILLING_YEARLY_DISCOUNT:-0.17}
      BILLING_RENEWAL_WINDOW_DAYS: ${BILLING_RENEWAL_WINDOW_DAYS:-3}
      BILLING_DEFAULT_PROVIDER: ${BILLING_DEFAULT_PROVIDER:-paystack}
      BILLING_CARD_PROVIDER: ${BILLING_CARD_PROVIDER:-}
      BILLING_TRANSFER_PROVIDER: ${BILLING_TRANSFER_PROVIDER:-}
      PAYSTACK_BASE_URL: ${PAYSTACK_BASE_URL:-https://api.paystack.co}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY:-}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY:-}
      PAYSTACK_DVA_PREFERRED_BANK: ${PAYSTACK_DVA_PREFERRED_BANK:-}
      PAYSTACK_TIMEOUT_SECONDS: ${PAYSTACK_TIMEOUT_SECONDS:-15}
      OPAY_BASE_URL: ${OPAY_BASE_URL:-}
      OPAY_PUBLIC_KEY: ${OPAY_PUBLIC_KEY:-}
      OPAY_SECRET_KEY: ${OPAY_SECRET_KEY:-}
      OPAY_MERCHANT_ID: ${OPAY_MERCHANT_ID:-}
      OPAY_STATIC_VA_PATH: ${OPAY_STATIC_VA_PATH:-}
      OPAY_CALLBACK_HASH: ${OPAY_CALLBACK_HASH:-sha512}
      OPAY_TIMEOUT_SECONDS: ${OPAY_TIMEOUT_SECONDS:-15}
      HEALTHSCOUT_ORIGINS: ${HEALTHSCOUT_ORIGINS:-}
    volumes:
      - django_media:/app/media
    depends_on:
      - postgres
      - qdrant
      - redis

  auth-web:
    image: ${AUTH_WEB_IMAGE:-ghcr.io/fildahs/auth-web:main}
    restart: unless-stopped
    expose:
      - "80"

  fildah-web:
    image: ${FILDAH_WEB_IMAGE:-ghcr.io/fildahs/fildah-web:main}
    restart: unless-stopped
    expose:
      - "80"

  healthscout-web:
    image: ${HEALTHSCOUT_WEB_IMAGE:-ghcr.io/fildahs/healthscout-web:main}
    restart: unless-stopped
    expose:
      - "80"

  rxchat-web:
    image: ${RXCHAT_WEB_IMAGE:-ghcr.io/fildahs/rxchat-web:main}
    restart: unless-stopped
    expose:
      - "80"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    expose:
      - "6379"

  qdrant:
    image: qdrant/qdrant:v1.17.1
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"

volumes:
  redis_data:
  postgres_data:
  qdrant_data:
  django_media:
  caddy_data:
  caddy_config:
